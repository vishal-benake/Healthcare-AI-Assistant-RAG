<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Healthcare AI Assistant</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #0b1220;
    color: #e5e7eb;
    font-family: Arial, sans-serif;
}

.chat-container {
    max-width: 900px;
    margin: 30px auto;
}

.chat-box {
    height: 70vh;
    overflow-y: auto;
    padding: 20px;
    border-radius: 16px;
    background: #111827;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
}

.message {
    margin-bottom: 15px;
    display: flex;
}

.user {
    justify-content: flex-end;
}

.bot {
    justify-content: flex-start;
}

.bubble {
    max-width: 70%;
    padding: 12px 15px;
    border-radius: 14px;
    line-height: 1.4;
}

.user .bubble {
    background: #2563eb;
    color: white;
    border-bottom-right-radius: 4px;
}

.bot .bubble {
    background: #1f2937;
    border-bottom-left-radius: 4px;
}

.input-box {
    margin-top: 15px;
    display: flex;
    gap: 10px;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: #1f2937;
    color: white;
}

button {
    padding: 12px 18px;
    border-radius: 10px;
    border: none;
    background: #22c55e;
    color: white;
}

button:hover {
    background: #16a34a;
}

.badge-custom {
    font-size: 12px;
    margin-top: 5px;
}

.sources {
    font-size: 12px;
    margin-top: 8px;
    color: #9ca3af;
}

.typing {
    display: inline-block;
}

.dot {
    height: 6px;
    width: 6px;
    margin: 0 2px;
    background-color: #9ca3af;
    border-radius: 50%;
    display: inline-block;
    animation: blink 1.4s infinite both;
}

.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink {
    0%, 80%, 100% { opacity: 0; }
    40% { opacity: 1; }
}

</style>
</head>

<body>

<div class="chat-container">

    <h3 class="text-center mb-3">Healthcare AI Assistant</h3>

    <div class="chat-box" id="chatBox"></div>

    <div class="input-box">
        <input id="input" placeholder="Ask your medical question..." />
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script>

function addMessage(role, text, sources=null, confidence=null) {

    const chatBox = document.getElementById("chatBox");

    const msg = document.createElement("div");
    msg.classList.add("message", role);

    const bubble = document.createElement("div");
    bubble.classList.add("bubble");

    bubble.innerHTML = text;

    if (confidence) {
        const badge = document.createElement("div");
        badge.classList.add("badge-custom");

        let color = "#9ca3af";
        if (confidence === "high") color = "#22c55e";
        else if (confidence === "medium") color = "#f59e0b";
        else color = "#ef4444";

        badge.innerHTML = `<span style="color:${color}">Confidence: ${confidence}</span>`;
        bubble.appendChild(badge);
    }

    if (sources && sources.length) {
        const src = document.createElement("div");
        src.classList.add("sources");
        src.innerHTML = "Sources: " + sources.map(s => s.file).join(", ");
        bubble.appendChild(src);
    }

    msg.appendChild(bubble);
    chatBox.appendChild(msg);

    chatBox.scrollTop = chatBox.scrollHeight;
}

function showTyping() {

    const chatBox = document.getElementById("chatBox");

    const typing = document.createElement("div");
    typing.classList.add("message", "bot");
    typing.id = "typing";

    typing.innerHTML = `
        <div class="bubble">
            <span class="typing">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </span>
        </div>
    `;

    chatBox.appendChild(typing);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function removeTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
}

async function sendMessage() {

    const input = document.getElementById("input");
    const query = input.value.trim();

    if (!query) return;

    addMessage("user", query);
    input.value = "";

    showTyping();

    try {

        const res = await fetch("/query", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({query})
        });

        const data = await res.json();

        removeTyping();

        typeWriter(data.answer, data.sources, data.confidence);

    } catch (e) {
        removeTyping();
        addMessage("bot", "Error connecting to server.");
    }
}

function typeWriter(text, sources, confidence) {

    const chatBox = document.getElementById("chatBox");

    const msg = document.createElement("div");
    msg.classList.add("message", "bot");

    const bubble = document.createElement("div");
    bubble.classList.add("bubble");

    msg.appendChild(bubble);
    chatBox.appendChild(msg);

    let i = 0;

    function typing() {

        if (i < text.length) {
            bubble.innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, 15);
        } else {

            if (confidence) {
                const badge = document.createElement("div");
                badge.classList.add("badge-custom");

                let color = "#9ca3af";
                if (confidence === "high") color = "#22c55e";
                else if (confidence === "medium") color = "#f59e0b";
                else color = "#ef4444";

                badge.innerHTML = `<span style="color:${color}">Confidence: ${confidence}</span>`;
                bubble.appendChild(badge);
            }

            if (sources && sources.length) {
                const src = document.createElement("div");
                src.classList.add("sources");
                src.innerHTML = "Sources: " + sources.map(s => s.file).join(", ");
                bubble.appendChild(src);
            }
        }

        chatBox.scrollTop = chatBox.scrollHeight;
    }

    typing();
}

</script>

</body>
</html>
